name: Build Windows EXE Installer

on:
  push:
    tags:
      - 'v*'              # Trigger on version tags: v1.0.0, v2.1.3, etc.
    branches:
      - main              # Also build (but don't release) on main pushes
  pull_request:
    branches:
      - main
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: write         # Needed to create GitHub Releases

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── Node setup ──────────────────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ── Generate icons ──────────────────────────────────────────────────────
      - name: Install Pillow and generate icons
        run: |
          pip install Pillow --quiet
          python scripts/generate-icon.py

      # ── Python backend ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt pyinstaller --quiet

      - name: Compile backend with PyInstaller
        working-directory: backend
        run: pyinstaller backend.spec --clean --noconfirm

      # ── React frontend ───────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci --silent

      - name: Build React frontend
        working-directory: frontend
        run: npm run build:react

      # ── Electron / NSIS installer ────────────────────────────────────────────
      - name: Build Windows installer
        working-directory: frontend
        run: npx electron-builder build --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload build artifact (always) ───────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsStorageSense-installer
          path: |
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.yml
          retention-days: 14

      # ── Create GitHub Release (tags only) ────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.yml
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
